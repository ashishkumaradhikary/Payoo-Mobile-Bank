<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Home</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- Tailwind & Daisy UI Connect -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font Connect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- font-awesome connect -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Manrope", sans-serif;
        }
    </style>
</head>

<body class="max-w-md bg-slate-100  mx-auto h-[1020px] pt-5 px-3 ">

    <!-- Header Section -->

    <header class=" h-20 flex justify-between items-center border-b-2 border-gray-300">
        <div class="header-left flex gap-3">
            <div class="logo w-[60px]">
                <img src="./assets/logo.png" alt="">
            </div>
            <div class="balance">
                <h3 class="text-2xl font-bold">$<span id="balance">45000</span></h3>
                <p class="text-neutral/50">Available Balance</p>
            </div>
        </div>
        <div class="logout">
            <button class="btn btn-soft bg-slate-200"><a href="./index.html"><i
                        class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a></button>
        </div>

    </header>

    <!-- Service Section -->

    <section>
        <h3 class="text-2xl font-bold mt-8">Welcome to Pay<span class="text-primary">oo</span></h3>
        <p class="text-neutral/50 mt-3">Enjoy easy and convenient financial services with us. Cashout charge is low and
        </p>
    </section>

    <section class="grid grid-cols-3 gap-4 mt-6">
        <button onclick="showOnly('add-money')" class="btn btn-soft bg-base-200 flex flex-col py-2 h-22">
                <img src="./assets/opt-1.png" alt="">
                <p>Add Money</p>
        </button>
        <button onclick="showOnly('cash-out')" class="btn btn-soft bg-base-200 flex flex-col  py-2 h-22">
                <img src="./assets/opt-2.png" alt="">
                <p>Cashout</p>
        </button>
        <button class="btn btn-soft bg-base-200 flex flex-col  py-2 h-22">
            <img src="./assets/opt-3.png" alt="">
            <p>Transfer Money</p>
        </button>
        <button class="btn btn-soft bg-base-200 flex flex-col  py-2 h-22">
            <img src="./assets/opt-4.png" alt="">
            <p>Get Bonus</p>
        </button>
        <button class="btn btn-soft bg-base-200 flex flex-col  py-2 h-22">
            <img src="./assets/opt-5.png" alt="">
            <p>Pay Bill</p>
        </button>
        <button class="btn btn-soft bg-base-200 flex flex-col py-2 h-22">
            <img src="./assets/opt-6.png" alt="">
            <p>Transactions</p>
        </button>
    </section>

    <!-- Add Money Section -->

    <div id="add-money" class="login-form mt-5 hidden ">
        <h2 class="text-2xl font-bold mb-5 mx-auto text-center">Add Money</h2>
        <div class="card bg-base-100 w-full max-w-sm  shadow mx-auto rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset space-y-2">
                    <label class="label font-bold text-base ">Select a Bank</label>
                    <select id="bank-name" class="select rounded-3xl bg-slate-100 w-full">
                        <option disabled selected>Select a Bank</option>
                        <option>Sonali Bangk PLC</option>
                        <option>Rupali Bank PLC</option>
                        <option>Krishi Bank PLC</option>
                    </select>
                    <label class="label font-bold text-base ">Account Number</label>
                    <input id="cash-in-number" type="text" maxlength="11" minlength="11"
                        class="input rounded-3xl bg-slate-100 w-full" placeholder="Enter Agent Number" />
                    <label class="label font-bold text-base ">Add Amount</label>
                    <input id="cash-in-amount" type="number" maxlength="11" minlength="11"
                        class="input rounded-3xl bg-slate-100 w-full" placeholder="Enter Cashout Amount" />
                    <label class="label font-bold text-base ">4 Digit PIN</label>
                    <input id="cash-in-pin" type="text" maxlength="11" minlength="11"
                        class="input rounded-3xl bg-slate-100 w-full" placeholder="Enter Your PIN" />
                    <button id="btn-cash-in" class="btn mt-3 bg-primary rounded-3xl w-full"><span
                            class="text-blue-50">Add Money</span></button>
                </fieldset>
            </div>
        </div>
    </div>

    <!-- Cash Out Section -->

    <div id="cash-out" class="login-form mt-5 hidden ">
        <h2 class="text-2xl font-bold mb-5 mx-auto text-center">Cashout</h2>
        <div class="card bg-base-100 w-full max-w-sm  shadow mx-auto rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset space-y-2">
                    <label class="label font-bold text-base ">Agent Number</label>
                    <input id="agent-number" type="text" maxlength="11" minlength="11"
                        class="input rounded-3xl bg-slate-100 w-full" placeholder="Enter Agent Number" />
                    <label class="label font-bold text-base ">Cashout Amount</label>
                    <input id="cashout-amount" type="number" maxlength="11" minlength="11"
                        class="input rounded-3xl bg-slate-100 w-full" placeholder="Enter Cashout Amount" />
                    <label class="label font-bold text-base ">4 Digit PIN</label>
                    <input id="cashout-pin" type="text" maxlength="11" minlength="11"
                        class="input rounded-3xl bg-slate-100 w-full" placeholder="Enter Your PIN" />
                    <button id="btn-withdraw" class="btn mt-3 bg-primary rounded-3xl w-full"><span
                            class="text-blue-50">Cashout</span></button>
                </fieldset>
            </div>
        </div>
    </div>


    <!-- javaScript Connections -->

    <script src="./script/addmoney.js"></script>
    <script src="./script/cashout.js"></script>
    <script src="./script/home.js"></script>

</body>

</html>
