<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Login</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- Tailwind & Daisy UI Connect -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Font Connect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">

    <!-- font-awesome connect -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Manrope", sans-serif;
        }
    </style>
</head>
<body>
    <div class="container max-w-md bg-slate-200 mx-auto h-[900px] pt-30">
        <div class="logo w-[200px] mx-auto">
            <img src="./assets/Logo-full.png" alt="">
        </div>
        <div class="login-form mt-10">
            <div class="card bg-base-100 w-[350px] max-w-sm  shadow mx-auto rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset space-y-2">
                        <label class="label font-bold text-base ">Mobile Number</label>
                        <input id="mobile-number"  type="text" maxlength="11" minlength="11" class="input rounded-3xl bg-slate-100 w-[300px]" placeholder="Enter your number" />
                        <label class="label font-bold text-base">4 Digit PIN</label>
                        <input id="pin" type="password" maxlength="4" minlength="4" class="input rounded-3xl bg-slate-100 w-[300px]" placeholder="Enter 4 Digit PIN" />
                        <button id="btn-login" class="btn mt-1 bg-primary rounded-3xl w-[300px]"><span class="text-blue-50">Login</span></button>
                    </fieldset>
                </div>
            </div>
        </div>
    </div>

    <!-- javaScript Code -->
     <script>
        document.getElementById('btn-login').addEventListener('click', function(){
            let mobileNumber = document.getElementById('mobile-number').value;
            let pin = document.getElementById('pin').value;

            if (mobileNumber == '01234567890' && pin == '1234'){
                alert('Login Success')
                window.location.assign("./home.html")
                document.getElementById('mobile-number').value = "";
            } else {
                alert(' Sorry! Wrong Mobile Number or PIN')
            }
        })
     </script>
</body>
</html>
